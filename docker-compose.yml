version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatbotagent-server
    # No host port mapping — only accessible from within Docker network
    expose:
      - "5001"
    env_file:
      - ./server/.env
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      KOKORO_URL: http://host.docker.internal:8880
      STT_URL: http://host.docker.internal:8000
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: chatbotagent-client
    ports:
      - "127.0.0.1:80:80"   # Bind to localhost only — cloudflared connects here
    depends_on:
      - server
    restart: unless-stopped