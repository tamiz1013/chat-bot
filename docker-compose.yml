version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatbotagent-server
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    environment:
      # Override so the server can reach Ollama running on the host machine
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chatbotagent-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
